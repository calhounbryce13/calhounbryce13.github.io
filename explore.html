<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Bryce Calhoun</title>
            <script src="script/explore.js"></script>
            <link id="stylesheet" rel="stylesheet" href="style/main.css">
            <link id="stylesheet" rel="stylesheet" href="style/explore.css">
            <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
            <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
            <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
            <link rel="manifest" href="favicon/site.webmanifest">
        </head>
        <body>
            <header>
                <div id="myName">
                    <p>
                        Explore
                    </p>
                </div>
            </header>
            <div class="explore-content">
                <div class="explore-unit">
                    <h2>Watch the algorithm search the maze</h2>
                    <ol>
                        <li>click a blank white cell to pin the target.</li>
                        <li>click the start cell to initiate the search for the target.</li>
                    </ol>
                    <ul>
                        <li>with a target, click a blank white cell to add a wall.</li>
                    </ul>
                    <div class="maze">
                    </div>
                    <div class="options-for-explore">
                        <div class="selection">
                            <div class="toggle-switch">DFS</div>
                        </div>
                    </div>
                    <div class="reset-container">
                        <div id="reset">
                            <div class="reset-icon"></div>
                            reset
                        </div>
                    </div>
                </div>
            </div>
            <div class="ooze"></div>
            <div class="ooze"></div>
            <div class="ooze"></div>
            <div class="ooze"></div>
            <div class="ooze"></div>
            <div class="ooze"></div>
            <div class="ooze"></div>
            <div class="ooze"></div>
            <div id="footerContainer">
                <footer>
                    &copy;2025 Bryce Calhoun
                </footer>
            </div>
        </body>
    </html>
